services:
  api:
    build:
      context: ./backend
    command: uv run fastapi dev app/main.py --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      # Override host .env: inside Compose the API must reach the chroma service, not localhost.
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - chroma

  frontend:
    build:
      context: ./frontend
      target: dev          # use the lightweight dev stage, not the production runner
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app    # live source reload
      - /app/node_modules  # keep image node_modules; don't let host (empty) override them
    depends_on:
      - api

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

